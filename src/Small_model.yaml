root: results/
dataset_file_name: train.xyz
run_name: LaMnO3_small
default_dtype: float64
model_dtype: float32

model_builders:
  - SimpleIrrepsConfig
  - EnergyModel
  - PerSpeciesRescale
  - StressForceOutput
  - RescaleEnergyEtc

dataset: ase
dataset_seed: 123
seed: 123
n_train: 1145
n_val: 100
shuffle: true
train_val_split: random

chemical_symbols:
    - La
    - Mn
    - O

key_mapping:
  R: pos
  total_energy: total_energy
  forces: forces

r_max: 6
l_max: 1
batch_size: 5
validation_batch_size: 10
max_epochs: 100000
learning_rate: 0.005

ema_decay: 0.99
ema_use_num_updates: true
invariant_layers: 3
invariant_neurons: 32

num_basis: 16
num_features: 16
num_layers: 3

log_batch_freq: 100
log_epoch_freq: 1

loss_coeffs:
  forces: 1
  total_energy:
  - 1
  - PerAtomMSELoss

BesselBasis_trainable: true
PolynomialCutoff_p: 6
allow_tf32: true
append: true
avg_num_neighbors: auto

early_stopping_lower_bounds:
  LR: 1.0e-05
early_stopping_patiences:
    validation_f_rmse: 25
early_stopping_delta:
    validation_f_rmse: 0.005
early_stopping_cumulative_delta: true

lr_scheduler_factor: 0.5
lr_scheduler_name: ReduceLROnPlateau
lr_scheduler_patience: 100

metrics_components:
- - forces
  - mae
- - forces
  - rmse
- - forces
  - mae
  - PerSpecies: true
    report_per_component: false
- - forces
  - rmse
  - PerSpecies: true
    report_per_component: false
- - total_energy
  - rmse
- - total_energy
  - rmse
  - PerAtom: true
metrics_key: validation_loss

nonlinearity_gates:
  e: silu
  o: tanh
nonlinearity_scalars:
  e: silu
  o: tanh
nonlinearity_type: gate

optimizer_amsgrad: true
optimizer_name: Adam

parity: true

per_species_rescale_scales: null
per_species_rescale_arguments_in_dataset_units: True
per_species_rescale_shifts_trainable: true
per_species_rescale_shifts: dataset_per_species_total_energy_mean
report_init_validation: true


save_checkpoint_freq: -1
save_ema_checkpoint_freq: -1

use_ema: true
use_sc: true

verbose: info
wandb: false
